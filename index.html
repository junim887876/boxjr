<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistema de Encomendas</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    color:white;
    min-height:100vh;
    padding:25px;
}

.container{
    max-width:1400px;
    margin:auto;
}

.topo{
    margin-bottom:25px;
}

.topo h1{
    font-size:35px;
    font-weight:700;
}

.topo p{
    color:#94a3b8;
    margin-top:5px;
}

.card{
    background:#111827;
    border-radius:28px;
    padding:28px;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
}

.search{
    width:100%;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:#1e293b;
    color:white;
    font-size:16px;
    margin-bottom:25px;
}

.clientes{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:15px;
    max-height:350px;
    overflow:auto;
    margin-bottom:30px;
}

.cliente{
    background:#1e293b;
    border:none;
    border-radius:18px;
    padding:18px;
    color:white;
    cursor:pointer;
    transition:0.25s;
    text-align:left;
}

.cliente:hover{
    transform:translateY(-3px);
    background:#2563eb;
}

.cliente.active{
    background:linear-gradient(135deg,#2563eb,#06b6d4);
}

.nome{
    font-size:16px;
    font-weight:600;
    margin-bottom:8px;
}

.cpf{
    font-size:13px;
    color:#dbeafe;
}

.info{
    background:#0f172a;
    padding:22px;
    border-radius:20px;
    margin-bottom:25px;
}

.info small{
    color:#94a3b8;
}

.info h2{
    margin-top:8px;
}

.form{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.group{
    display:flex;
    flex-direction:column;
}

.group label{
    margin-bottom:10px;
    color:#cbd5e1;
}

.group input,
.group select,
.group textarea{
    background:#1e293b;
    border:none;
    border-radius:16px;
    padding:16px;
    color:white;
    outline:none;
    font-size:15px;
}

.group textarea{
    resize:none;
    height:120px;
}

.full{
    grid-column:1/-1;
}

.btn{
    width:100%;
    margin-top:30px;
    border:none;
    border-radius:18px;
    padding:20px;
    background:linear-gradient(135deg,#2563eb,#06b6d4);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
}

.status{
    text-align:center;
    margin-top:20px;
    font-weight:600;
}

@media(max-width:900px){

    .form{
        grid-template-columns:1fr;
    }

}

</style>
</head>
<body>

<div class="container">

    <div class="topo">
        <h1>📦 Sistema de Encomendas</h1>
        <p>Google Sheets + Google Forms</p>
    </div>

    <div class="card">

        <input
            type="text"
            class="search"
            id="pesquisa"
            placeholder="Pesquisar cliente..."
        >

        <div class="clientes" id="clientes"></div>

        <div class="info">

            <small>CLIENTE SELECIONADO</small>

            <h2 id="clienteSelecionado">
                Nenhum cliente selecionado
            </h2>

        </div>

        <div class="form">

            <div class="group">
                <label>Código / ID</label>
                <input type="text" id="codigo">
            </div>

            <div class="group">
                <label>Marketplace</label>

                <select id="marketplace">
                    <option>Shopee</option>
                    <option>Mercado Livre</option>
                    <option>Amazon</option>
                </select>
            </div>

            <div class="group">
                <label>Data de Chegada</label>
                <input type="date" id="data">
            </div>

            <div class="group">
                <label>Status</label>

                <select id="statusPedido">
                    <option>Disponivel</option>
                    <option>Aguardando Cliente</option>
                    <option>Saiu para Entrega</option>
                    <option>Entregue</option>
                </select>
            </div>

            <div class="group full">
                <label>Descrição</label>
                <textarea id="descricao"></textarea>
            </div>

        </div>

        <button class="btn" onclick="enviarFormulario()">
            ENVIAR ENCOMENDA
        </button>

        <div class="status" id="status"></div>

    </div>

</div>

<script>

/*
=========================================
CSV GOOGLE SHEETS
=========================================
*/

const CSV_URL =
"https://docs.google.com/spreadsheets/d/1UheMU2TdciHPVOv4WZfjZ8zxiKY9or9hnDPzZ0lfOog/export?format=csv";

/*
=========================================
GOOGLE FORM
=========================================
*/

const FORM_URL =
"https://docs.google.com/forms/d/e/1FAIpQLScx7Yy0yjewDcoylnhD46-elmIuouRUwzlFl-somaa7qdQSvQ/formResponse";

/*
=========================================
ENTRIES
=========================================
*/

const ENTRY_NOME = "entry.153948278";
const ENTRY_CPF = "entry.1963426399";
const ENTRY_CODIGO = "entry.589087970";
const ENTRY_DESCRICAO = "entry.240508373";
const ENTRY_STATUS = "entry.672544438";

/*
CRIE NO FORMS:
- DATA
- MARKETPLACE

E TROQUE OS IDS ABAIXO
*/

const ENTRY_DATA = "entry.111111111";
const ENTRY_MARKETPLACE = "entry.222222222";

/*
=========================================
VARIÁVEIS
=========================================
*/

let clientes = [];
let clienteAtual = null;

/*
=========================================
CARREGAR CLIENTES
=========================================
*/

async function carregarClientes(){

    const resposta = await fetch(CSV_URL);

    const csv = await resposta.text();

    const linhas = csv
    .split(/\r?\n/)
    .filter(l => l.trim() !== "");

    clientes = linhas.slice(1).map(linha => {

        const colunas =
        linha.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

        return {

            nome:
            colunas?.[0]
            ?.replaceAll('"','')
            ?.trim() || "",

            cpf:
            colunas?.[1]
            ?.replaceAll('"','')
            ?.trim() || ""

        };

    });

    renderizarClientes(clientes);

}

/*
=========================================
MOSTRAR CLIENTES
=========================================
*/

function renderizarClientes(lista){

    const area =
    document.getElementById("clientes");

    area.innerHTML = "";

    lista.forEach(cliente => {

        const btn =
        document.createElement("button");

        btn.className = "cliente";

        btn.innerHTML = `
            <div class="nome">
                ${cliente.nome}
            </div>

            <div class="cpf">
                CPF: ${cliente.cpf}
            </div>
        `;

        btn.onclick = () =>
        selecionarCliente(cliente, btn);

        area.appendChild(btn);

    });

}

/*
=========================================
SELECIONAR CLIENTE
=========================================
*/

function selecionarCliente(cliente, elemento){

    clienteAtual = cliente;

    document.querySelectorAll(".cliente")
    .forEach(btn =>
        btn.classList.remove("active")
    );

    elemento.classList.add("active");

    document.getElementById(
        "clienteSelecionado"
    ).innerHTML = `
        ${cliente.nome}
        <br>
        <small>${cliente.cpf}</small>
    `;

}

/*
=========================================
PESQUISA
=========================================
*/

document.getElementById("pesquisa")
.addEventListener("input", function(){

    const valor =
    this.value.toLowerCase();

    const filtrados =
    clientes.filter(cliente =>

        cliente.nome
        .toLowerCase()
        .includes(valor)

    );

    renderizarClientes(filtrados);

});

/*
=========================================
ENVIAR FORMULÁRIO
=========================================
*/

async function enviarFormulario(){

    if(!clienteAtual){

        alert("Selecione um cliente");

        return;
    }

    const codigo =
    document.getElementById("codigo").value;

    const dataRaw = document.getElementById("data").value; // Pega o valor: 2026-05-20
    const dataFormatada = dataRaw.split('-')[2] + "/" + dataRaw.split('-')[1]; // Transforma para: 20/05

    const descricao =
    document.getElementById("data").value;

    const statusPedido =
    document.getElementById("statusPedido").value;

    const data =
    document.getElementById("descricao").value;

    const marketplace =
    document.getElementById("marketplace").value;

    const formData = new FormData();

    /*
    AUTOMÁTICO DO CSV
    */

    formData.append(
        ENTRY_NOME,
        clienteAtual.cpf
    );


    /*
    CAMPOS MANUAIS
    */

    formData.append(
        ENTRY_CODIGO,
        marketplace
    );

    formData.append(
        ENTRY_DESCRICAO,
        descricao
    );

    formData.append(
        ENTRY_STATUS,
        statusPedido
    );

    formData.append(
        ENTRY_DATA,
        dataFormatada
    );

    formData.append(
        ENTRY_MARKETPLACE,
        marketplace
    );

    try{

        await fetch(FORM_URL,{
            method:"POST",
            mode:"no-cors",
            body:formData
        });

        document.getElementById("status")
        .innerHTML =
        "✅ ENCOMENDA ENVIADA";

        document.getElementById("status")
        .style.color = "#4ade80";

        document.getElementById("codigo").value = "";
        document.getElementById("descricao").value = "";

    }catch(erro){

        document.getElementById("status")
        .innerHTML =
        "❌ ERRO AO ENVIAR";

    }

}

/*
=========================================
DATA AUTOMÁTICA
=========================================
*/

document.getElementById("data").value =
new Date().toISOString().split("T")[0];

/*
=========================================
INICIAR
=========================================
*/

carregarClientes();

</script>

</body>
</html>
